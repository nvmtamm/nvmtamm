<svg width="360" height="178" viewBox="0 0 360 178" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fullstack Path</title>
  <desc id="desc">Preparing for React as the next step toward delivering complete end-to-end products.</desc>
  <defs>
    <linearGradient id="bg" x1="22" y1="0" x2="338" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1620"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="24" y1="0" x2="336" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(316 32) rotate(133.417) scale(126.811 103.948)">
      <stop stop-color="#2DD4BF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="360" height="178" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="358" height="176" rx="23" stroke="#1E293B"/>
  <rect x="20" y="20" width="140" height="28" rx="14" fill="#0E2C2A"/>
  <circle cx="34" cy="34" r="4" fill="#2DD4BF"/>
  <text x="46" y="38" fill="#CCFBF1" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0.12em">PRODUCT TRACK</text>
  <circle cx="316" cy="32" r="52" fill="url(#glow)"/>
  <text x="24" y="82" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="700">Fullstack</text>
  <text x="24" y="112" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="700">Path</text>
  <text x="24" y="136" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="13.5">
    <tspan x="24" dy="0">Preparing for React and complete</tspan>
    <tspan x="24" dy="18">end-to-end product delivery.</tspan>
  </text>
  <rect x="24" y="152" width="312" height="8" rx="4" fill="#112523"/>
  <rect x="24" y="152" width="182" height="8" rx="4" fill="url(#accent)"/>
  <text x="282" y="160" fill="#99F6E4" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="end">REACT</text>
  <text x="336" y="160" fill="#5EEAD4" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="end">DELIVERY</text>
</svg>
