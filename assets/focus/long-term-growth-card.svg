<svg width="360" height="178" viewBox="0 0 360 178" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Long-Term Growth</title>
  <desc id="desc">Exploring DevSecOps to better understand secure, modern, and production-ready workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="24" y1="0" x2="336" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="24" y1="0" x2="336" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(316 32) rotate(133.417) scale(126.811 103.948)">
      <stop stop-color="#A78BFA" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="360" height="178" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="358" height="176" rx="23" stroke="#312E81"/>
  <rect x="20" y="20" width="142" height="28" rx="14" fill="#231F5B"/>
  <circle cx="34" cy="34" r="4" fill="#A78BFA"/>
  <text x="46" y="38" fill="#EDE9FE" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0.12em">GROWTH TRACK</text>
  <circle cx="316" cy="32" r="52" fill="url(#glow)"/>
  <text x="24" y="82" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="700">Long-Term</text>
  <text x="24" y="112" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="700">Growth</text>
  <text x="24" y="136" fill="#D6D3F1" font-family="Segoe UI, Arial, sans-serif" font-size="13.5">
    <tspan x="24" dy="0">Exploring DevSecOps for secure,</tspan>
    <tspan x="24" dy="18">modern, production-ready workflows.</tspan>
  </text>
  <rect x="24" y="152" width="312" height="8" rx="4" fill="#251E55"/>
  <rect x="24" y="152" width="204" height="8" rx="4" fill="url(#accent)"/>
  <text x="267" y="160" fill="#C4B5FD" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="end">DEVSECOPS</text>
  <text x="336" y="160" fill="#A78BFA" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="end">WORKFLOWS</text>
